<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app-title">ラブ❤ねいる</title>
  <meta name="referrer" content="no-referrer">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <div class="app-logo" data-i18n="sidebar-logo">ラブ❤ねいる</div>
    <div class="header-controls">
      <!-- 設定 -->
      <div class="settings-anchor">
        <button class="header-btn" id="settingsBtn" title="設定">
          <i data-lucide="settings"></i>
          <span class="apikey-indicator" id="apikeyIndicator" hidden></span>
        </button>
      </div>
    </div>
  </header>

  <div class="app-layout">

    <!-- サイドバー -->
    <aside class="sidebar" id="sidebar">

      <!-- チャンネル検索・追加 -->
      <div class="sidebar-search-wrap">
        <input class="sidebar-search-input" id="sidebarSearchInput" type="text" placeholder="URL / @handle を追加" data-i18n-ph="search-ph" autocomplete="off">
        <button class="sidebar-search-btn" id="sidebarSearchBtn" aria-label="追加" data-i18n-aria="search-add">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="sidebar-search-status" id="sidebarSearchStatus"></div>

      <!-- コンパクトモード: チャンネル追加ボタン -->
      <div class="sidebar-compact-add-wrap" id="sidebarCompactAddWrap">
        <button class="sidebar-compact-add-btn" id="sidebarCompactAddBtn" aria-label="追加">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>
      </div>

      <!-- チャンネルリスト（グループ別） -->
      <nav class="sidebar-nav" id="sidebarNav"></nav>

      <!-- リサイズハンドル -->
      <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>

      <!-- フッター -->
      <div class="sidebar-footer">
      </div>
    </aside>

    <!-- メインエリア -->
    <div class="main-area">

      <!-- チャンネル選択後のサブヘッダ -->
      <div class="channel-header" id="channelHeader">
        <span id="chNoSelect" class="ch-no-select" data-i18n="no-channel-selected">チャンネルを選択してください</span>
        <img id="chAvatar" class="ch-avatar" src="" alt="" referrerpolicy="no-referrer" style="display:none">
        <span id="chName" class="ch-name" style="display:none"></span>
        <div class="ch-tabs" id="chTabs" style="display:none">
          <button class="ch-tab active" data-view="vote" data-i18n="tab-vote">投票</button>
          <button class="ch-tab" data-view="list" data-i18n="tab-list">一覧</button>
          <button class="ch-tab" data-view="ranking" data-i18n="tab-ranking">ランキング</button>
        </div>
        <div class="cat-filter" id="catFilter" style="display:none">
          <button class="cat-btn active" data-cat="videos" data-i18n="cat-videos">動画</button>
          <button class="cat-btn" data-cat="shorts" data-i18n="cat-shorts">ショート</button>
          <button class="cat-btn" data-cat="live" data-i18n="cat-live">ライブ</button>
        </div>
      </div>

      <!-- ウェルカム画面（チャンネル未選択時） -->
      <div id="welcomeScreen" class="screen">
        <div class="welcome-inner">
          <div class="welcome-card">
            <div class="welcome-field">
              <label class="welcome-label" data-i18n="welcome-add-label">チャンネルを追加</label>
              <div class="welcome-search-wrap">
                <input id="welcomeHandleInput" class="welcome-search-input" type="text" placeholder="@handle" autocomplete="off" spellcheck="false">
                <button id="welcomeAddBtn" class="welcome-search-btn" data-i18n="welcome-add-btn">追加</button>
              </div>
              <div id="welcomeAddStatus" class="welcome-search-status"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 投票画面 -->
      <div id="voteScreen" class="screen" style="display:none">
        <div class="vote-tutorial" id="voteTutorial">
          <div class="vote-tutorial-body">
            <p data-i18n="tutorial-vote-text">好きなサムネイルをクリックして投票。結果はランキングに反映されます。</p>
            <button class="vote-tutorial-close" id="voteTutorialClose" data-i18n="tutorial-got-it">わかった</button>
          </div>
        </div>
        <div class="vote-counter"><span data-i18n="vote-counter-pre">これまでの投票: </span><span id="voteCount">0</span><span data-i18n="vote-counter-post"> 回</span></div>
        <div class="vote-pace-wrap">
          <div class="vote-pace-bar-bg"><div class="vote-pace-bar-fill" id="paceFill" style="width:0%"></div></div>
          <span id="paceLabel">-</span>
        </div>
        <div class="vote-pair-wrap">
          <div class="vote-pair" id="votePair"></div>
        </div>
      </div>

      <!-- 一覧画面 -->
      <div id="listScreen" class="screen" style="display:none">
        <div class="list-toolbar">
          <button class="list-mode-btn active" id="listModeGalleryBtn" title="ギャラリー">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="list-mode-btn" id="listModeGridBtn" title="グリッド">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <!-- ソートボタン群 -->
          <div id="shortsSortBar" style="gap:4px; align-items:center; margin-left:auto; display:flex;">
            <button class="shorts-sort-btn active" data-sort="views"  data-i18n="sort-views"></button>
            <button class="shorts-sort-btn" data-sort="date"   data-i18n="sort-date"></button>
            <button class="shorts-sort-btn" data-sort="rating" data-i18n="sort-rating"></button>
            <button class="shorts-sort-btn" data-sort="random" data-i18n="sort-random"></button>
          </div>
        </div>
        <div id="listGrid"></div>
        <div id="shortsSentinel" style="height:1px;"></div>
      </div>

      <!-- ランキング画面 -->
      <div id="rankingScreen" class="screen" style="display:none">
        <div class="ranking-header">
          <div>
            <h2 data-i18n="ranking-h2">ランキング</h2>
            <small id="rankSubtitle"></small>
          </div>
        </div>
        <div class="rank-list" id="rankList"></div>
      </div>

      <!-- リアクション画面 -->
      <div id="reactionsScreen" class="screen" style="display:none">
        <button class="rs-back-btn" id="reactionsBackBtn" data-i18n="reactions-back">戻る</button>
        <div class="rs-sidebar-ghost"></div>
        <div class="rs-img-wrap" id="reactionsImgWrap">
          <img id="reactionsImg" src="" alt="" referrerpolicy="no-referrer">
          <div class="reactions-heatmap-layer" id="reactionsHeatmapLayer"></div>
          <div class="reactions-pins-layer" id="reactionsPinsLayer"></div>
          <div class="reactions-my-pin-shadow" id="reactionsMyPinShadow" hidden></div>
          <div class="reactions-my-pin" id="reactionsMyPin" hidden>
            <svg id="reactionsMyPinSvg" class="reactions-pin-svg reactions-my-pin-svg" viewBox="0 0 24 30" width="36" height="45" xmlns="http://www.w3.org/2000/svg">
              <path class="pin-balloon" d="M12,29 C5.5,21.5 1.5,17 1.5,11 a10.5,10.5,0,0,1,21,0 C22.5,17 18.5,21.5 12,29 Z"/>
              <g transform="translate(12 11) scale(0.38) translate(-12 -12)">
                <path class="pin-icon" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </g>
            </svg>
            <span class="reactions-my-pin-label" data-i18n="reactions-you">あなた</span>
          </div>
        </div>
        <div class="rs-sidebar">
          <span class="rs-title" id="reactionsTitle"></span>
          <div class="rs-sep"></div>
          <div class="rs-mode-row">
            <button class="rs-mode-btn active" id="reactionsPinsModeBtn" data-i18n="reactions-pins">Pins</button>
            <button class="rs-mode-btn" id="reactionsHeatmapModeBtn" data-i18n="reactions-heatmap">Heatmap</button>
          </div>
          <div class="rs-sep"></div>
          <div class="rs-color-section">
            <span class="rs-color-label" data-i18n="reactions-color">カラー</span>
            <div class="rs-swatch-row">
              <button class="rs-swatch active" data-color="#ec4899" style="background:#ec4899"></button>
              <button class="rs-swatch" data-color="#00b0f4" style="background:#00b0f4"></button>
              <button class="rs-swatch" data-color="#57f287" style="background:#57f287"></button>
              <button class="rs-swatch" data-color="#f59e0b" style="background:#f59e0b"></button>
              <button class="rs-swatch" data-color="#a855f7" style="background:#a855f7"></button>
            </div>
          </div>
          <div style="flex:1"></div>
          <a class="rs-yt-btn" id="reactionsYtBtn" href="#" target="_blank" rel="noopener noreferrer" data-i18n="yt-btn">YouTube</a>
        </div>
      </div>

    </div>
  </div>


  <!-- サムネモーダル -->
  <div id="thumbModal" role="dialog" aria-modal="true">
    <div class="modal-inner">
      <button class="modal-close" id="modalClose" aria-label="閉じる" data-i18n-aria="modal-close">✕</button>
      <div class="modal-img-wrap" id="modalImgWrap">
        <img id="modalImg" src="" alt="" referrerpolicy="no-referrer">
        <div class="modal-badge" id="modalBadge"></div>
      </div>
      <div class="modal-info" id="modalInfo">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-stats" id="modalStats"></div>
        <div class="modal-bar-bg"><div class="modal-bar-fill" id="modalBarFill" style="width:0%"></div></div>
      </div>
      <div class="modal-actions" id="modalActions">
        <a id="modalYtBtn" class="modal-yt-btn" href="#" target="_blank" rel="noopener noreferrer" data-i18n="yt-btn">YouTube で見る</a>
        <button class="modal-reactions-btn" id="modalReactionsBtn" data-i18n="reactions-open">リアクション</button>
      </div>

    </div>
  </div>

  <!-- 設定モーダル -->
  <div id="settingsModal" class="settings-modal-backdrop" hidden>
    <div class="settings-modal" role="dialog" aria-modal="true">

      <!-- 左ナビ -->
      <div class="settings-modal-sidebar">
        <div class="settings-modal-sidebar-title" data-i18n="settings-title">設定</div>
        <nav class="settings-nav">
          <button class="settings-nav-item active" data-tab="display">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <span data-i18n="settings-tab-display">表示</span>
          </button>
          <button class="settings-nav-item" data-tab="lang">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span data-i18n="settings-tab-lang">言語</span>
          </button>
          <button class="settings-nav-item" data-tab="apikey">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
            <span data-i18n="settings-tab-apikey">APIキー</span>
          </button>
          <button class="settings-nav-item" data-tab="sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            <span data-i18n="settings-tab-sidebar">データ</span>
          </button>
        </nav>
      </div>

      <!-- 右コンテンツ -->
      <div class="settings-modal-content">
        <div class="settings-modal-header">
          <h2 class="settings-modal-heading" id="settingsModalHeading">表示</h2>
          <button class="settings-modal-close" id="settingsModalClose" data-i18n-title="settings-close" data-i18n-aria="settings-close" title="閉じる" aria-label="閉じる">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- 表示タブ -->
        <div class="settings-tab" id="settingsTab-display">
          <div class="settings-field">
            <div class="settings-field-label" data-i18n="settings-theme-label">テーマ</div>
            <div class="settings-theme-btns">
              <button class="settings-theme-btn" id="settingsThemeDark" data-i18n="settings-theme-dark">ダーク</button>
              <button class="settings-theme-btn" id="settingsThemeLight" data-i18n="settings-theme-light">ライト</button>
            </div>

          </div>
        </div>

        <!-- 言語タブ -->
        <div class="settings-tab" id="settingsTab-lang" hidden>
          <div id="langOptionList" class="lang-option-list"></div>
          <div id="langAddSection" hidden>
            <hr class="lang-dialog-sep">
            <div class="lang-add-form">
              <div id="langImportDrop" class="lang-import-drop">
                <i data-lucide="file-json" style="width:22px;height:22px;opacity:0.5;flex-shrink:0"></i>
                <div class="drop-text">
                  <span data-i18n="lang-import-drop"></span>
                  <span style="font-size:10px;" data-i18n="drop-hint"></span>
                </div>
              </div>
              <p class="lang-import-or" data-i18n="lang-import-or"></p>
              <textarea id="langImportText" class="lang-import-textarea" rows="4" data-i18n-ph="lang-import-ph"></textarea>
              <div class="lang-import-actions">
                <button class="popover-btn popover-btn-primary" id="langImportApply" data-i18n="lang-import-apply"></button>
                <span style="flex:1"></span>
                <button class="popover-btn" id="langTemplateDownload" data-i18n-title="lang-template-dl" style="min-width:0;width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center"><i data-lucide="download"></i></button>
              </div>
            </div>
          </div>
        </div>

        <!-- API Keyタブ -->
        <div class="settings-tab" id="settingsTab-apikey" hidden>
          <div class="settings-field">
            <div class="settings-field-label" data-i18n="settings-apikey-label">YouTube APIキー</div>
            <div class="apikey-input-wrap">
              <input id="apikeyPopoverInput" class="apikey-input" type="text" placeholder="AIzaSy..." autocomplete="off" spellcheck="false">
              <button id="apikeyToggleBtn" class="apikey-toggle-btn" type="button" title="表示切り替え">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div id="apikeyPopoverStatus" class="apikey-popover-status"></div>
            <div class="apikey-edit-actions">
              <button id="apikeyPopoverSave" class="apikey-action-btn apikey-action-btn--primary" data-i18n="settings-apikey-save">保存</button>
              <button id="apikeyDeleteBtn" class="apikey-action-btn apikey-action-btn--danger" data-i18n="settings-apikey-delete" hidden>削除</button>
            </div>
            <p class="settings-field-desc"><a href="https://www.youtube.com/watch?v=9VJ_7tVEDUQ" data-i18n-href="settings-apikey-guide-url" target="_blank" rel="noopener" class="settings-link" data-i18n="settings-apikey-guide">API キーの発行方法</a></p>
          </div>
          <div class="settings-field">
            <label class="settings-toggle-row">
              <input type="checkbox" id="rssOnlyToggle">
              <span class="settings-toggle-label" data-i18n="settings-rssonly-label">RSSのみ取得（最新15件）</span>
            </label>
            <p class="settings-field-desc" data-i18n="settings-rssonly-desc">APIキーを無視してRSSだけで取得。</p>
          </div>
        </div>

        <!-- サイドバーデータタブ -->
        <div class="settings-tab" id="settingsTab-sidebar" hidden>
          <div class="settings-field">
            <div class="settings-field-label" data-i18n="settings-data-label">バックアップ</div>
            <div class="settings-data-btns">
              <button class="settings-data-btn" id="sidebarExportBtn" data-i18n="settings-data-export">エクスポート</button>
              <button class="settings-data-btn" id="sidebarImportBtn" data-i18n="settings-data-import">インポート</button>
              <input type="file" id="sidebarImportFile" accept=".json" style="display:none">
            </div>
            <div id="sidebarDataStatus" class="settings-status"></div>
            <p class="settings-field-desc" data-i18n="settings-data-desc">サイドバーのチャンネル・フォルダ構成を JSON ファイルとして保存・復元します。</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/anime.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
