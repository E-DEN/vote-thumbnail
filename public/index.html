<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんなの推しサムネ</title>
  <meta name="referrer" content="no-referrer">
  <script src="config.js" onerror="void 0"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">

    <!-- サイドバー -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">推しサムネ</span>
      </div>

      <!-- チャンネル検索・追加 -->
      <div class="sidebar-search-wrap">
        <input class="sidebar-search-input" id="sidebarSearchInput" type="text" placeholder="URL / @handle を追加" autocomplete="off">
        <button class="sidebar-search-btn" id="sidebarSearchBtn" aria-label="追加">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="sidebar-search-status" id="sidebarSearchStatus"></div>

      <!-- チャンネルリスト（グループ別） -->
      <nav class="sidebar-nav" id="sidebarNav"></nav>

      <!-- リサイズハンドル -->
      <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>

      <!-- フッター -->
      <div class="sidebar-footer">
        <button class="sidebar-manage-btn" id="sidebarManageBtn" title="グループ管理">グループ管理</button>
      </div>
    </aside>

    <!-- メインエリア -->
    <div class="main-area">

      <!-- チャンネル選択後のサブヘッダ -->
      <div class="channel-header" id="channelHeader" style="display:none">
        <img class="ch-avatar" id="chAvatar" src="" alt="" referrerpolicy="no-referrer">
        <span class="ch-name" id="chName"></span>
        <div class="ch-tabs">
          <button class="ch-tab active" data-view="vote">投票</button>
          <button class="ch-tab" data-view="list">一覧</button>
          <button class="ch-tab" data-view="ranking">ランキング</button>
        </div>
        <div class="cat-filter" id="catFilter">
          <button class="cat-btn active" data-cat="videos">動画</button>
          <button class="cat-btn" data-cat="shorts">ショート</button>
          <button class="cat-btn" data-cat="live">ライブ</button>
        </div>
      </div>

      <!-- ウェルカム画面（チャンネル未選択時） -->
      <div id="welcomeScreen" class="screen">
        <div class="welcome-inner">
          <div class="welcome-title">チャンネルを選択してください</div>
          <div class="welcome-sub">左のサイドバーからチャンネルを選ぶか、URLを入力して追加してください。</div>
        </div>
      </div>

      <!-- 投票画面 -->
      <div id="voteScreen" class="screen" style="display:none">
        <div class="vote-counter">これまでの投票: <span id="voteCount">0</span> 回</div>
        <div class="vote-pace-wrap">
          <div class="vote-pace-bar-bg"><div class="vote-pace-bar-fill" id="paceFill" style="width:0%"></div></div>
          <span id="paceLabel">-</span>
        </div>
        <div class="vote-pair-wrap">
          <div class="vote-pair" id="votePair"></div>
        </div>
        <div class="vote-skip"><button id="skipBtn">スキップ</button></div>
      </div>

      <!-- 一覧画面 -->
      <div id="listScreen" class="screen" style="display:none">
        <div id="listGrid"></div>
      </div>

      <!-- ランキング画面 -->
      <div id="rankingScreen" class="screen" style="display:none">
        <div class="ranking-header">
          <div>
            <h2>ランキング</h2>
            <small id="rankSubtitle"></small>
          </div>
          <button class="reset-btn" id="resetBtn">データリセット</button>
        </div>
        <div class="rank-list" id="rankList"></div>
      </div>

    </div>
  </div>

  <!-- グループ管理モーダル -->
  <div id="groupModal">
    <div class="group-modal-inner">
      <div class="group-modal-header">
        <div class="group-modal-title">グループ管理</div>
        <button class="group-modal-close-btn" id="groupModalCloseBtn">&times;</button>
      </div>
      <div class="group-modal-body">
        <div class="gm-left">
          <div class="gm-left-scroll" id="gmGroupList"></div>
          <div class="gm-left-add">
            <input id="groupLabelInput" type="text" placeholder="グループ名">
            <button id="groupAddConfirmBtn">作成</button>
          </div>
        </div>
        <div class="gm-right" id="gmDetail">
          <div class="gm-right-empty">&larr; グループを選択してください</div>
        </div>
      </div>
    </div>
  </div>

  <!-- サムネモーダル -->
  <div id="thumbModal" role="dialog" aria-modal="true">
    <div class="modal-inner">
      <button class="modal-close" id="modalClose" aria-label="閉じる">✕</button>
      <div class="modal-img-wrap">
        <img id="modalImg" src="" alt="">
        <div class="modal-badge" id="modalBadge"></div>
      </div>
      <div class="modal-info">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-stats" id="modalStats"></div>
        <div class="modal-bar-bg"><div class="modal-bar-fill" id="modalBarFill" style="width:0%"></div></div>
      </div>
      <div class="modal-actions">
        <a id="modalYtBtn" class="modal-yt-btn" href="#" target="_blank" rel="noopener noreferrer">YouTube で見る</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
