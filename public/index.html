<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんなの推しサムネ</title>
  <meta name="referrer" content="no-referrer">
  <script src="config.js" onerror="void 0"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo" id="logoBtn" role="button" tabindex="0">みんなの推しサムネ</div>
    <div class="tabs">
      <button class="tab-btn active" id="tabVote">投票</button>
      <button class="tab-btn" id="tabList">一覧</button>
      <button class="tab-btn" id="tabRanking">ランキング</button>
    </div>
    <button class="tab-btn fetch-tab" id="tabFetch"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:4px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>取得</button>
  </header>

  <div id="catFilterBar">
    <div class="cat-filter" id="catFilter">
      <button class="cat-btn active" data-cat="videos">動画</button>
      <button class="cat-btn" data-cat="shorts">ショート</button>
      <button class="cat-btn" data-cat="live">ライブ</button>
    </div>
  </div>
  <div id="channelInfoBar">
    <img class="cib-avatar" id="cibAvatar" src="" alt="" referrerpolicy="no-referrer">
    <span class="cib-name" id="cibName"></span>
    <span class="cib-sub" id="cibSub"></span>
    <button class="cib-back" id="cibBackBtn">← チャンネル一覧</button>
  </div>

  <main>
    <!-- Home Screen -->
    <div id="homeScreen" style="display:none">
      <div class="home-hero">
        <div class="home-search-wrap">
          <input id="homeSearchInput" type="text" placeholder="@ハンドル または チャンネルURLで検索・追加" autocomplete="off">
          <button class="home-search-btn" id="homeSearchBtn" aria-label="検索">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
      </div>
      <div class="home-group-bar" id="homeGroupBar"></div>
      <div class="home-section-title">チャンネル</div>
      <div id="channelGrid" class="channel-grid"></div>
      <button class="home-add-btn" id="homeAddBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        チャンネルを追加
      </button>
      <button class="home-db-export-btn" id="homeDbExportBtn" title="全チャンネルのデータをJSONに書き出す (db/import.js 用)">DB エクスポート</button>
    </div>

    <!-- Fetch Screen -->
    <div id="fetchScreen">
      <div class="fetch-form">
        <input id="channelUrl" type="text" placeholder="チャンネルURL（@handle または /channel/UC...）">
        <div class="fetch-actions">
          <button id="fetchApiBtn">取得</button>
          <label class="zip-label">ZIP読み込み<input type="file" id="zipImport" accept=".zip"></label>
        </div>
        <div id="fetchStatus"></div>
        <div class="fetch-result-btns" id="fetchBtns" style="display:none">
          <button id="saveJsonBtn">JSONで保存</button>
          <button id="saveZipBtn">ZIPでDL</button>
          <button class="primary-btn" id="loadToAppBtn">このデータで使う</button>
        </div>
      </div>
    </div>

    <!-- Vote Screen -->
    <div id="voteScreen" style="display:none">
      <div class="vote-counter">これまでの投票: <span id="voteCount">0</span> 回</div>
      <div class="vote-pace-wrap">
        <div class="vote-pace-bar-bg"><div class="vote-pace-bar-fill" id="paceFill" style="width:0%"></div></div>
        <span id="paceLabel">-</span>
      </div>
      <div class="vote-pair-wrap">
        <div class="vote-pair" id="votePair"></div>
      </div>
      <div class="vote-skip"><button id="skipBtn">スキップ</button></div>
    </div>

    <!-- List Screen -->
    <div id="listScreen" style="display:none">
      <div id="listGrid"></div>
    </div>

    <!-- Ranking Screen -->
    <div id="rankingScreen" style="display:none">
      <div class="ranking-header">
        <div>
          <h2>ランキング</h2>
          <small id="rankSubtitle"></small>
        </div>
        <button class="reset-btn" id="resetBtn">データリセット</button>
      </div>
      <div class="rank-list" id="rankList"></div>
    </div>
  </main>

  <!-- Group Modal -->
  <div id="groupModal">
    <div class="group-modal-inner">
      <div class="group-modal-header">
        <div class="group-modal-title">グループ管理</div>
        <button class="group-modal-close-btn" id="groupModalCloseBtn">&times;</button>
      </div>
      <div class="group-modal-body">
        <div class="gm-left">
          <div class="gm-left-scroll" id="gmGroupList"></div>
          <div class="gm-left-add">
            <input id="groupLabelInput" type="text" placeholder="グループ名">
            <button id="groupAddConfirmBtn">作成</button>
          </div>
        </div>
        <div class="gm-right" id="gmDetail">
          <div class="gm-right-empty">&larr; グループを選択してください</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Thumb Modal -->
  <div id="thumbModal" role="dialog" aria-modal="true">
    <div class="modal-inner">
      <button class="modal-close" id="modalClose" aria-label="閉じる">✕</button>
      <div class="modal-img-wrap">
        <img id="modalImg" src="" alt="">
        <div class="modal-badge" id="modalBadge"></div>
      </div>
      <div class="modal-info">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-stats" id="modalStats"></div>
        <div class="modal-bar-bg"><div class="modal-bar-fill" id="modalBarFill" style="width:0%"></div></div>
      </div>
      <div class="modal-actions">
        <a id="modalYtBtn" class="modal-yt-btn" href="#" target="_blank" rel="noopener noreferrer">YouTube で見る</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
