<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャンネルサムネ一覧</title>
  <script src="../config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 20px; background: #111; color: #eee; }
    .form { display: flex; flex-direction: column; gap: 8px; max-width: 600px; margin-bottom: 16px; }
    input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #222; color: #eee; font-size: 14px; }
    button { padding: 8px 16px; border-radius: 4px; border: none; background: #c00; color: #fff; cursor: pointer; font-size: 14px; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { margin-bottom: 12px; font-size: 13px; color: #aaa; min-height: 20px; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .thumb { position: relative; border-radius: 4px; overflow: hidden; background: #222; text-decoration: none; }
    .thumb img { width: 100%; display: block; }
    .thumb .title { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.75); font-size: 11px; color: #eee; padding: 4px 6px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="form">
    <input id="channelUrl" type="text" placeholder="チャンネルURL（@handle または /channel/UC...）">
    <div style="display:flex;gap:8px;align-items:center">
      <button id="fetchBtn">取得</button>
      <button id="saveBtn" style="display:none;background:#1a6">JSONで保存</button>
      <button id="zipBtn" style="display:none;background:#169">ZIPでDL</button>
      <span id="zipStatus" style="font-size:12px;color:#aaa"></span>
    </div>
  </div>
  <div id="status"></div>
  <div id="grid"></div>

  <script>
    const BASE = 'https://www.googleapis.com/youtube/v3';

    async function downloadAsZip(videos, channelUrl) {
      const zipStatus = document.getElementById('zipStatus');
      const zipBtn = document.getElementById('zipBtn');
      zipBtn.disabled = true;
      const zip = new JSZip();
      const name = (channelUrl.match(/@([\.\w-]+)/) ?? channelUrl.match(/UC[\w-]+/) ?? ['videos'])[0].replace('@', '');
      const manifest = { channelUrl, fetchedAt: new Date().toISOString(), videos };
      zip.file('videos.json', JSON.stringify(manifest, null, 2));
      for (let i = 0; i < videos.length; i++) {
        const v = videos[i];
        zipStatus.textContent = `画像取得中: ${i + 1} / ${videos.length}`;
        try {
          const res = await fetch(v.thumb);
          const buf = await res.arrayBuffer();
          const ext = v.thumb.includes('.webp') ? 'webp' : 'jpg';
          zip.file(`${v.category}/${v.id}.${ext}`, buf);
        } catch {
          // 取得失敗はスキップ
        }
      }
      zipStatus.textContent = 'ZIP生成中...';
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `thumbs-${name}.zip`;
      a.click();
      URL.revokeObjectURL(url);
      zipStatus.textContent = '完了';
      zipBtn.disabled = false;
    }

    function saveAsJson(videos, channelUrl) {
      const data = { channelUrl, fetchedAt: new Date().toISOString(), videos };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const name = (channelUrl.match(/@([\.\w-]+)/) ?? channelUrl.match(/UC[\w-]+/) ?? ['videos'])[0].replace('@', '');
      a.href = url;
      a.download = `thumbs-${name}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function parseChannel(url) {
      const mHandle = url.match(/@([\w.-]+)/);
      if (mHandle) return { type: 'handle', value: mHandle[1] };
      const mId = url.match(/channel\/(UC[\w-]+)/);
      if (mId) return { type: 'id', value: mId[1] };
      return null;
    }

    async function apiFetch(url) {
      const res = await fetch(url);
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        const msg = body.error?.message ?? res.status;
        throw new Error(msg);
      }
      return res.json();
    }

    async function getUploadsPlaylistId(apiKey, channel) {
      const params = new URLSearchParams({ part: 'contentDetails', key: apiKey });
      if (channel.type === 'handle') params.set('forHandle', channel.value);
      else params.set('id', channel.value);
      const data = await apiFetch(`${BASE}/channels?${params}`);
      const item = data.items?.[0];
      if (!item) throw new Error('チャンネルが見つかりませんでした');
      return item.contentDetails.relatedPlaylists.uploads;
    }

    async function getAllVideoIds(apiKey, playlistId, onProgress) {
      const ids = [];
      let pageToken = '';
      do {
        const params = new URLSearchParams({ part: 'contentDetails', playlistId, maxResults: 50, key: apiKey });
        if (pageToken) params.set('pageToken', pageToken);
        const data = await apiFetch(`${BASE}/playlistItems?${params}`);
        for (const item of data.items ?? []) {
          ids.push(item.contentDetails.videoId);
        }
        pageToken = data.nextPageToken ?? '';
        onProgress(ids.length, data.pageInfo?.totalResults ?? 0);
      } while (pageToken);
      return ids;
    }

    function parseDurationSec(iso) {
      const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
      if (!m) return 0;
      return (parseInt(m[1] ?? 0) * 3600) + (parseInt(m[2] ?? 0) * 60) + parseInt(m[3] ?? 0);
    }

    async function getVideoDetails(apiKey, videoIds, onProgress) {
      const results = [];
      for (let i = 0; i < videoIds.length; i += 50) {
        const batch = videoIds.slice(i, i + 50);
        const params = new URLSearchParams({ part: 'snippet,contentDetails,liveStreamingDetails', id: batch.join(','), key: apiKey });
        const data = await apiFetch(`${BASE}/videos?${params}`);
        for (const v of data.items ?? []) {
          const dur = parseDurationSec(v.contentDetails.duration);
          const isLive = !!v.liveStreamingDetails;
          const isShort = !isLive && dur <= 180;
          const category = isLive ? 'live' : isShort ? 'shorts' : 'videos';
          const thumbs = v.snippet.thumbnails;
          const thumb = thumbs.maxres?.url ?? thumbs.standard?.url ?? thumbs.high?.url ?? thumbs.medium?.url ?? '';
          results.push({ id: v.id, title: v.snippet.title, thumb, category });
        }
        onProgress(Math.min(i + 50, videoIds.length), videoIds.length);
      }
      return results;
    }

    function renderGrid(videos) {
      const grid = document.getElementById('grid');
      grid.textContent = '';
      for (const v of videos) {
        const a = document.createElement('a');
        a.className = 'thumb';
        a.href = `https://www.youtube.com/watch?v=${v.id}`;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        const img = document.createElement('img');
        img.src = v.thumb;
        img.alt = '';
        img.loading = 'lazy';

        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = v.title;

        const badge = document.createElement('div');
        badge.style.cssText = 'position:absolute;top:4px;left:4px;font-size:10px;padding:1px 5px;border-radius:3px;color:#fff;font-weight:bold;';
        if (v.category === 'live') { badge.textContent = 'LIVE'; badge.style.background = '#c00'; }
        else if (v.category === 'shorts') { badge.textContent = 'SHORT'; badge.style.background = '#555'; }

        a.appendChild(img);
        if (v.category !== 'videos') a.appendChild(badge);
        a.appendChild(title);
        grid.appendChild(a);
      }
    }

    document.getElementById('fetchBtn').addEventListener('click', async () => {
      const apiKey = (typeof CONFIG !== 'undefined' ? CONFIG.youtubeApiKey : '');
      const channelUrl = document.getElementById('channelUrl').value.trim();
      const status = document.getElementById('status');
      const btn = document.getElementById('fetchBtn');

      if (!apiKey || apiKey === 'YOUR_API_KEY_HERE') {
        status.textContent = 'config.js に APIキーを設定してください';
        return;
      }
      if (!channelUrl) {
        status.textContent = 'チャンネルURLを入力してください';
        return;
      }
      const channel = parseChannel(channelUrl);
      if (!channel) {
        status.textContent = 'URLの形式が不正です（@handle または /channel/UC...）';
        return;
      }

      btn.disabled = true;
      document.getElementById('grid').textContent = '';

      try {
        status.textContent = 'チャンネル情報を取得中...';
        const playlistId = await getUploadsPlaylistId(apiKey, channel);

        const videoIds = await getAllVideoIds(apiKey, playlistId, (cur, total) => {
          status.textContent = `動画ID取得中: ${cur} / ${total}`;
        });

        status.textContent = '動画詳細を取得中...';
        const videos = await getVideoDetails(apiKey, videoIds, (cur, total) => {
          status.textContent = `詳細取得中: ${cur} / ${total}`;
        });

        status.textContent = `${videos.length} 件`;
        renderGrid(videos);
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.style.display = '';
        saveBtn.onclick = () => saveAsJson(videos, channelUrl);
        const zipBtn = document.getElementById('zipBtn');
        zipBtn.style.display = '';
        zipBtn.onclick = () => downloadAsZip(videos, channelUrl);
      } catch (err) {
        status.textContent = `エラー: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
